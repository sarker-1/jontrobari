<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JontroBari</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Container */
.container {
  text-align: center;
}

/* Logo */
.logo {
  width: 110px;
  margin-bottom: 10px;
}

/* Title */
h1 {
  margin: 5px 0;
  color: #7a1c3a;
  font-size: 26px;
}

p {
  margin-bottom: 25px;
  color: #555;
}

/* 3D Button Base */
.btn {
  display: block;
  width: 280px;
  margin: 15px auto;
  padding: 15px;
  border-radius: 14px;
  text-decoration: none;
  font-weight: bold;
  color: white;
  font-size: 16px;
  box-shadow: 
    0 8px 15px rgba(0,0,0,0.2),
    inset 0 2px 3px rgba(255,255,255,0.4);
  transition: 0.2s;
}

/* Press Effect */
.btn:active {
  transform: translateY(3px);
  box-shadow: 
    0 4px 8px rgba(0,0,0,0.2),
    inset 0 2px 3px rgba(255,255,255,0.4);
}

/* Button Colors */
.whatsapp {
  background: linear-gradient(#34d058, #28a745);
}

.call {
  background: linear-gradient(#4a7d8c, #2f5f6b);
}

.map {
  background: linear-gradient(#4a7d8c, #2f5f6b);
}
</style>
</head>

<body>

<div class="container">

  <!-- 🔥 LOGO -->
  <img src="logo.png" class="logo">

  <h1>JontroBari</h1>
  <p>At Your Service</p>

  <a class="btn whatsapp" href="https://wa.me/message/BJ7O7USQ6TWCK1">
    Chat on WhatsApp
  </a>

  <a class="btn call" href="tel:+8801560026241">
    Call Now
  </a>

  <a class="btn map" href="https://maps.app.goo.gl/5wGvWdRfqwQMRtxk6?g_st=ic">
    View Location
  </a>

</div>

</body>
</html>
