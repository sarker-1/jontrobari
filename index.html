<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JontroBari</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f3f3f3;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.container{text-align:center;padding:20px;}

.logo{
  width:230px;
  animation:float 3s infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}

/* Buttons */
.btn{
  display:block;
  width:280px;
  margin:10px auto;
  padding:14px;
  border-radius:14px;
  color:white;
  font-weight:bold;
  text-decoration:none;
  transition:.2s;
}

.btn:hover{transform:translateY(-2px);}
.btn:active{transform:scale(0.95);}

.whatsapp{background:#28a745;}
.call{background:#2f5f6b;}
.map{background:#2f5f6b;}
.service{background:#ff7a00;}
.pay{background:#8e0038;}
.review{background:#444;}

/* Stars */
.stars{
  font-size:22px;
  color:gold;
  animation:glow 1.5s infinite alternate;
}

@keyframes glow{
  from{text-shadow:0 0 5px gold;}
  to{text-shadow:0 0 15px orange;}
}

/* Modal */
.modal{
  display:none;
  position:fixed;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:flex-end;
}

.modal.show{display:flex;}

.modal-content{
  width:100%;
  max-width:420px;
  background:white;
  border-radius:20px 20px 0 0;
  padding:20px;
  position:relative;
  animation:slideUp .3s ease;
  max-height:80vh;
  overflow-y:auto;
}

@keyframes slideUp{
  from{transform:translateY(100%);}
  to{transform:translateY(0);}
}

/* Back button */
.back{
  position:absolute;
  top:10px;
  left:10px;
  width:36px;
  height:36px;
  border-radius:50%;
  border:none;
  background:#eee;
}

/* Services */
.service-option{
  background:#eee;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  font-weight:bold;
}

.service-list{
  text-align:left;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h2>JontroBari</h2>

<a class="btn whatsapp"
href="https://wa.me/message/BJ7O7USQ6TWCK1?text=Hi,%20I%20want%20to%20get%20a%20service.">
Chat on WhatsApp</a>

<a class="btn call" href="tel:+8801560026241">Call Now</a>

<a class="btn map"
href="https://maps.app.goo.gl/5wGvWdRfqwQMRtxk6">
View Location</a>

<div class="btn service" onclick="openService()">Services</div>

<div class="btn pay" onclick="openPay()">Pay Now</div>

<a class="btn review"
href="https://www.google.com/search?q=Jontrobari+review"
target="_blank">
⭐ Customer Reviews
</a>

<div class="stars">★★★★★ 4.9</div>

<p>🕒 Open: 5 PM – 11 PM</p>

</div>

<!-- SERVICE MODAL -->
<div class="modal" id="serviceModal">
<div class="modal-content">

<button class="back" onclick="closeModal()">⟵</button>

<h3>Services</h3>

<div class="service-option" onclick="showService('mobile')">
📱 Phone Solutions
</div>

<div class="service-option" onclick="showService('pc')">
💻 PC/Laptop Solutions
</div>

<div id="serviceList" class="service-list"></div>

</div>
</div>

<!-- PAYMENT MODAL -->
<div class="modal" id="payModal">
<div class="modal-content">

<button class="back" onclick="closeModal()">⟵</button>

<h3>Payment</h3>

<p>Send via bKash / Nagad<br><b>01560026241</b></p>

</div>
</div>

<script>
function openService(){
document.getElementById("serviceModal").classList.add("show");
}
function openPay(){
document.getElementById("payModal").classList.add("show");
}
function closeModal(){
document.getElementById("serviceModal").classList.remove("show");
document.getElementById("payModal").classList.remove("show");
}

function showService(type){
let list=document.getElementById("serviceList");

if(type=="mobile"){
list.innerHTML=`
<ul>
<li>Display Fix</li>
<li>Battery Replacement</li>
<li>Charging Repair</li>
<li>Software Flashing</li>
<li>Device Unlocking</li>
<li>Data Backup</li>
<li>App Setup</li>
<li>Speaker & Mic Fix</li>
<li>Water Damage Fix</li>
<li>Camera Repair</li>
<li>Body Change</li>
<li>Button Repair</li>
<li>Glass Protection</li>
<li>Sim Slot Repair</li>
</ul>`;
}

if(type=="pc"){
list.innerHTML=`
<ul>
<li>Hardware Fix</li>
<li>Software Fix</li>
<li>OS Installation</li>
<li>Data Recovery</li>
<li>Network Setup</li>
<li>Virus Removal</li>
<li>Laptop Servicing</li>
<li>Custom PC Build</li>
<li>Account Setup</li>
<li>System Speedup</li>
<li>Driver Update</li>
<li>Thermal Paste</li>
<li>Keyboard Repair</li>
<li>SSD Upgrade</li>
</ul>`;
}
}
</script>

</body>
</html>
