<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JontroBari</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f3f3f3;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Container */
.container {
  text-align: center;
}

/* Logo */
.logo {
  width: 260px;
  margin-bottom: 10px;
  filter: drop-shadow(0 10px 20px rgba(0,0,0,0.25));
}

/* Title */
h1 {
  margin: 5px 0;
  color: #7a1c3a;
  font-size: 32px;
}

p {
  margin-bottom: 25px;
  color: #666;
}

/* Buttons */
.btn {
  display: block;
  width: 290px;
  margin: 15px auto;
  padding: 16px;
  border-radius: 16px;
  text-decoration: none;
  font-weight: bold;
  color: white;
  transition: all 0.25s ease;
  box-shadow: 
    0 8px 18px rgba(0,0,0,0.25),
    inset 0 2px 3px rgba(255,255,255,0.3);
}

/* Press animation */
.btn:active {
  transform: scale(0.96);
  box-shadow: 
    0 4px 10px rgba(0,0,0,0.3),
    inset 0 2px 4px rgba(0,0,0,0.2);
}

.btn:hover {
  transform: translateY(-2px);
}

/* Colors */
.whatsapp {
  background: linear-gradient(135deg, #34d058, #28a745);
}

.call {
  background: linear-gradient(135deg, #4a7d8c, #2f5f6b);
}

.map {
  background: linear-gradient(135deg, #4a7d8c, #2f5f6b);
}

.pay {
  background: linear-gradient(135deg, #c2185b, #8e0038);
}

/* Modal */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  padding: 25px;
  border-radius: 18px;
  width: 85%;
  max-width: 320px;
  text-align: center;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from {transform: scale(0.8); opacity: 0;}
  to {transform: scale(1); opacity: 1;}
}

/* Payment option */
.pay-option {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 15px;
  margin: 12px 0;
  padding: 16px 18px;
  border-radius: 14px;
  font-weight: bold;
  font-size: 18px;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

.pay-option:active {
  transform: scale(0.96);
}

/* 🔥 LOGO FIX (MAIN) */
.pay-option img {
  width: 42px;
  height: 42px;
  object-fit: contain;
  background: white;
  padding: 6px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.25);
}

/* Brand colors */
.bkash {
  background: linear-gradient(135deg, #e2136e, #b90d57);
}

.nagad {
  background: linear-gradient(135deg, #ff7a00, #e65c00);
}

/* Close button */
.close-btn {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #ddd;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

  <img src="logo.png" class="logo">

  <h1>JontroBari</h1>
  <p>At Your Service</p>

  <a class="btn whatsapp" href="https://wa.me/message/BJ7O7USQ6TWCK1">
    Chat on WhatsApp
  </a>

  <a class="btn call" href="tel:+8801560026241">
    Call Now
  </a>

  <a class="btn map" href="https://maps.app.goo.gl/5wGvWdRfqwQMRtxk6?g_st=ic">
    View Location
  </a>

  <div class="btn pay" onclick="openModal()">
    Pay Now
  </div>

</div>

<!-- Modal -->
<div class="modal" id="paymentModal">
  <div class="modal-content">
    <h3>Select Payment</h3>

    <div class="pay-option bkash" onclick="pay('bkash')">
      <img src="bkash.png"> bKash
    </div>

    <div class="pay-option nagad" onclick="pay('nagad')">
      <img src="nagad.png"> Nagad
    </div>

    <p>Send money to:<br><b>01560026241</b></p>

    <button class="close-btn" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
function openModal() {
  document.getElementById("paymentModal").style.display = "flex";
}

function closeModal() {
  document.getElementById("paymentModal").style.display = "none";
}

function pay(method) {
  if(method === 'bkash') {
    window.location.href = "https://play.google.com/store/apps/details?id=com.bKash.customerapp";
  }
  if(method === 'nagad') {
    window.location.href = "https://play.google.com/store/apps/details?id=com.konasl.nagad";
  }
}
</script>

</body>
</html>
