<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JontroBari</title>

<style>
body{margin:0;font-family:Arial;background:#f3f3f3;text-align:center;}

/* LOADER */
#loader{
position:fixed;width:100%;height:100%;
display:flex;justify-content:center;align-items:center;
background:#f3f3f3;z-index:9999;
}
.spinner{
width:50px;height:50px;border:5px solid #ddd;
border-top:5px solid #e2136e;border-radius:50%;
animation:spin 1s linear infinite;
}
@keyframes spin{100%{transform:rotate(360deg);}}

/* INTRO */
#intro{
position:fixed;width:100%;height:100%;
display:none;justify-content:center;align-items:center;
background:#f3f3f3;z-index:9998;
}
.intro-logo{width:220px;animation:zoom .8s ease;}
@keyframes zoom{from{opacity:0;transform:scale(.5);}to{opacity:1;}}

/* SCREEN */
.screen{display:none;}

.logo{width:250px;margin-top:20px}

/* BUTTON */
.btn{
display:block;width:85%;max-width:320px;
margin:12px auto;padding:15px;border-radius:14px;
color:white;font-weight:bold;text-decoration:none;
}
.whatsapp{background:#28a745;}
.call{background:#2f5f6b;}
.map{background:#2f5f6b;}
.services{background:#6a5acd;}
.review{background:#f5a623;}
.pay{background:#e2136e;}

/* BACK */
.back{
position:fixed;top:15px;left:15px;
background:#333;color:#fff;padding:10px;
border-radius:50%;display:none;z-index:10000;
}

/* LIST */
.list{
position:fixed;top:0;left:0;width:100%;height:100%;
background:#fff;overflow:auto;text-align:left;padding:20px;
}

/* MODAL */
.modal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,.5);
display:none;justify-content:center;align-items:center;
z-index:10000;
}
.box{
background:#fff;padding:20px;border-radius:15px;
width:85%;max-width:320px;
}

.pay-btn{
display:flex;align-items:center;justify-content:center;
gap:10px;margin:10px 0;padding:12px;border-radius:10px;color:white;
}
.bkash{background:#e2136e;}
.nagad{background:#ff7a00;}
.pay-btn img{width:40px;background:white;padding:5px;border-radius:6px;}
</style>
</head>

<body>

<div id="loader"><div class="spinner"></div></div>

<div id="intro"><img src="logo.png" class="intro-logo"></div>

<div class="back" id="backBtn" onclick="goHome()">←</div>

<!-- HOME -->
<div id="home" class="screen">
<img src="logo.png" class="logo">
<h2>JontroBari</h2>

<a class="btn whatsapp"
href="https://wa.me/8801560026241?text=Hi%2C%20I%20want%20to%20get%20a%20service.">
WhatsApp</a>

<a class="btn call" href="tel:+8801560026241">Call</a>

<a class="btn map"
href="https://maps.app.goo.gl/KcfMYgYNgyGyyiLdA">
Location</a>

<div class="btn services" onclick="openMenu()">Services</div>

<a class="btn review"
href="https://search.google.com/local/writereview?placeid=ChIJbV6OIQDbVTcRroLxH0yk84Q">
Reviews</a>

<!-- 🔥 PAY FIX -->
<div class="btn pay" onclick="openPay()">Pay Now</div>
</div>

<!-- MENU -->
<div id="menu" class="screen">
<h2>Select Service</h2>
<div class="btn services" onclick="openList('mobile')">📱 Phone</div>
<div class="btn services" onclick="openList('pc')">💻 PC</div>
</div>

<!-- LIST -->
<div id="mobile" class="list screen"><h2>Mobile Services</h2></div>
<div id="pc" class="list screen"><h2>PC Services</h2></div>

<!-- PAYMENT MODAL -->
<div class="modal" id="payModal">
<div class="box">
<h3>Payment</h3>

<div class="pay-btn bkash"
onclick="window.location.href='https://play.google.com/store/apps/details?id=com.bKash.customerapp'">
<img src="bkash.png"> bKash
</div>

<div class="pay-btn nagad"
onclick="window.location.href='https://play.google.com/store/apps/details?id=com.konasl.nagad'">
<img src="nagad.png"> Nagad
</div>

<button onclick="closePay()">Close</button>
</div>
</div>

<script>

/* SAFE SELECT */
const home = document.getElementById("home");
const menu = document.getElementById("menu");
const backBtn = document.getElementById("backBtn");
const payModal = document.getElementById("payModal");

/* RESET */
function reset(){
document.querySelectorAll(".screen").forEach(el=>el.style.display="none");
backBtn.style.display="none";
}

/* NAV */
function goHome(){
reset();
home.style.display="block";
}

function openMenu(){
reset();
menu.style.display="block";
backBtn.style.display="block";
}

function openList(id){
reset();
document.getElementById(id).style.display="block";
backBtn.style.display="block";
}

/* 🔥 PAY FIX */
function openPay(){
payModal.style.display="flex";
}

function closePay(){
payModal.style.display="none";
}

/* LOAD */
window.onload = function(){
setTimeout(()=>{
document.getElementById("loader").style.display="none";
document.getElementById("intro").style.display="flex";

setTimeout(()=>{
document.getElementById("intro").style.display="none";
goHome();
},900);

},500);
}
</script>

</body>
</html>
