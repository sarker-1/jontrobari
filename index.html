<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JontroBari</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f3f3f3;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* Container */
.container {
  text-align: center;
  padding: 25px 20px;
  animation: fadeIn 0.6s ease;
}

/* Logo */
.logo {
  width: 240px;
  margin-bottom: 12px;
  filter: drop-shadow(0 12px 25px rgba(0,0,0,0.25));
  animation: float 3s ease-in-out infinite;
}

/* Title */
h1 {
  margin: 6px 0;
  color: #7a1c3a;
  font-size: 30px;
  letter-spacing: 0.5px;
}

p {
  margin-bottom: 30px;
  color: #666;
  font-size: 15px;
}

/* Buttons */
.btn {
  display: block;
  width: 280px;
  max-width: 90%;
  margin: 14px auto;
  padding: 16px;
  border-radius: 16px;
  text-decoration: none;
  font-weight: bold;
  color: white;
  font-size: 16px;
  box-shadow: 
    0 10px 18px rgba(0,0,0,0.2),
    inset 0 2px 3px rgba(255,255,255,0.4);
  transition: all 0.25s ease;
}

/* Hover effect */
.btn:hover {
  transform: translateY(-3px);
  box-shadow: 
    0 14px 22px rgba(0,0,0,0.25),
    inset 0 2px 3px rgba(255,255,255,0.4);
}

/* Press effect */
.btn:active {
  transform: translateY(2px) scale(0.98);
}

/* Colors */
.whatsapp { background: linear-gradient(#34d058, #28a745); }
.call { background: linear-gradient(#4a7d8c, #2f5f6b); }
.map { background: linear-gradient(#4a7d8c, #2f5f6b); }
.pay { background: linear-gradient(#ff4d6d, #c9184a); }

/* Popup */
.popup {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  justify-content: center;
  align-items: center;
}

/* Popup animation */
.popup.show {
  display: flex;
  animation: fadeIn 0.3s ease;
}

.popup-content {
  background: #fff;
  padding: 24px;
  border-radius: 16px;
  text-align: center;
  width: 280px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.25);
  animation: popUp 0.3s ease;
}

/* Payment buttons */
.pay-option {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin: 12px 0;
  padding: 13px;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  font-weight: bold;
  font-size: 15px;
  transition: 0.2s;
}

.pay-option:hover {
  transform: scale(1.05);
}

.bkash { background: #e2136e; }
.nagad { background: #f97316; }

/* Icons */
.pay-option img {
  width: 26px;
  height: 26px;
}

/* Close button */
.close-btn {
  margin-top: 12px;
  padding: 8px 14px;
  border-radius: 8px;
  border: none;
  background: #eee;
  cursor: pointer;
}

/* Animations */
@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

@keyframes popUp {
  from {transform: scale(0.8); opacity: 0;}
  to {transform: scale(1); opacity: 1;}
}

@keyframes float {
  0%,100% {transform: translateY(0);}
  50% {transform: translateY(-6px);}
}
</style>
</head>

<body>

<div class="container">

  <img src="logo.png?v=2" class="logo">

  <h1>JontroBari</h1>
  <p>At Your Service</p>

  <a class="btn whatsapp" href="https://wa.me/message/BJ7O7USQ6TWCK1">Chat on WhatsApp</a>
  <a class="btn call" href="tel:+8801560026241">Call Now</a>
  <a class="btn map" href="https://maps.app.goo.gl/5wGvWdRfqwQMRtxk6?g_st=ic">View Location</a>

  <button class="btn pay" onclick="openPopup()">Pay Now</button>

</div>

<!-- Popup -->
<div class="popup" id="popup">
  <div class="popup-content">

    <h3>Select Payment</h3>

    <a class="pay-option bkash" href="https://www.bkash.com/" target="_blank">
      <img src="bkash.png">
      bKash
    </a>

    <a class="pay-option nagad" href="https://nagad.com.bd/" target="_blank">
      <img src="nagad.png">
      Nagad
    </a>

    <p style="margin-top:12px;">
      Send money to:<br><b>01560026241</b>
    </p>

    <button class="close-btn" onclick="closePopup()">Close</button>

  </div>
</div>

<script>
function openPopup() {
  document.getElementById("popup").classList.add("show");
}

function closePopup() {
  document.getElementById("popup").classList.remove("show");
}
</script>

</body>
</html>
