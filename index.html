<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JontroBari</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f3f3f3;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  text-align: center;
  padding: 20px;
}

.logo {
  width: 240px;
  margin-bottom: 10px;
  filter: drop-shadow(0 10px 20px rgba(0,0,0,0.25));
}

h1 {
  margin: 5px 0;
  color: #7a1c3a;
}

p {
  margin-bottom: 25px;
  color: #666;
}

.btn {
  display: block;
  width: 280px;
  max-width: 90%;
  margin: 15px auto;
  padding: 16px;
  border-radius: 14px;
  text-decoration: none;
  font-weight: bold;
  color: white;
  box-shadow: 0 8px 15px rgba(0,0,0,0.2);
}

.whatsapp { background: linear-gradient(#34d058, #28a745); }
.call { background: linear-gradient(#4a7d8c, #2f5f6b); }
.map { background: linear-gradient(#4a7d8c, #2f5f6b); }
.pay { background: linear-gradient(#ff4d6d, #c9184a); }

/* Popup */
.popup {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  justify-content: center;
  align-items: center;
}

.popup-content {
  background: white;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  width: 260px;
}

.pay-option {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin: 10px 0;
  padding: 10px;
  border-radius: 8px;
  text-decoration: none;
  color: white;
  font-weight: bold;
}

.bkash { background: #e2136e; }
.nagad { background: #f97316; }

.pay-option img {
  width: 25px;
}
</style>
</head>

<body>

<div class="container">

  <img src="logo.png?v=2" class="logo">

  <h1>JontroBari</h1>
  <p>At Your Service</p>

  <a class="btn whatsapp" href="https://wa.me/message/BJ7O7USQ6TWCK1">Chat on WhatsApp</a>
  <a class="btn call" href="tel:+8801560026241">Call Now</a>
  <a class="btn map" href="https://maps.app.goo.gl/5wGvWdRfqwQMRtxk6?g_st=ic">View Location</a>

  <!-- ✅ Pay button (just added) -->
  <button class="btn pay" onclick="openPopup()">Pay Now</button>

</div>

<!-- Popup -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h3>Select Payment</h3>

    <a class="pay-option bkash" href="https://www.bkash.com/" target="_blank">
      <img src="https://upload.wikimedia.org/wikipedia/commons/4/4f/BKash_logo.svg">
      bKash
    </a>

    <a class="pay-option nagad" href="https://nagad.com.bd/" target="_blank">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/68/Nagad_logo.png">
      Nagad
    </a>

    <p style="margin-top:10px;">
      Send money to:<br><b>01560026241</b>
    </p>

    <button onclick="closePopup()">Close</button>
  </div>
</div>

<script>
function openPopup() {
  document.getElementById("popup").style.display = "flex";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
