<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JontroBari</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f3f3f3;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  text-align: center;
  padding: 20px;
}

/* 🔥 Clean Logo (no blend, only shadow) */
.logo {
  width: 240px;
  margin-bottom: 10px;
  display: block;
  margin-left: auto;
  margin-right: auto;
  filter: drop-shadow(0 10px 20px rgba(0,0,0,0.25));
}

/* Title */
h1 {
  margin: 5px 0;
  color: #7a1c3a;
  font-size: 30px;
}

p {
  margin-bottom: 25px;
  color: #666;
}

/* Buttons */
.btn {
  display: block;
  width: 280px;
  max-width: 90%;
  margin: 15px auto;
  padding: 16px;
  border-radius: 14px;
  text-decoration: none;
  font-weight: bold;
  color: white;
  box-shadow: 
    0 8px 15px rgba(0,0,0,0.2),
    inset 0 2px 3px rgba(255,255,255,0.4);
  transition: 0.2s;
}

/* Press effect */
.btn:active {
  transform: translateY(3px);
}

/* Colors */
.whatsapp {
  background: linear-gradient(#34d058, #28a745);
}

.call {
  background: linear-gradient(#4a7d8c, #2f5f6b);
}

.map {
  background: linear-gradient(#4a7d8c, #2f5f6b);
}
</style>
</head>

<body>

<div class="container">

  <!-- 🔥 logo -->
  <img src="logo.png?v=2" class="logo" alt="JontroBari Logo">

  <h1>JontroBari</h1>
  <p>At Your Service</p>

  <a class="btn whatsapp" href="https://wa.me/message/BJ7O7USQ6TWCK1">
    Chat on WhatsApp
  </a>

  <a class="btn call" href="tel:+8801560026241">
    Call Now
  </a>

  <a class="btn map" href="https://maps.app.goo.gl/5wGvWdRfqwQMRtxk6?g_st=ic">
    View Location
  </a>

</div>

</body>
</html>
